services:
  api:
    build:
      context: .
    command: npm run start:api
    env_file:
      - path: .env
        required: false
    ports:
      - "4210:4210"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4210/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  bot:
    build:
      context: .
    command: npm run start:bot
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  dashboard:
    build:
      context: .
    command: npm --workspace @42bot/dashboard run preview -- --host 0.0.0.0 --port 4220
    ports:
      - "4220:4220"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4220/"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      api:
        condition: service_healthy
